name: Manual Cycle Bot (5H / 10M)

on:
  workflow_dispatch:

concurrency:
  group: wolf-cycle-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 600  # حماية (10 ساعات حد أقصى)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Cycle Bot
        env:
          U_MAIL: ${{ secrets.U_MAIL }}
          U_PASS: ${{ secrets.U_PASS }}
        run: |
          echo "🚀 بدء دورة البوت (5 ساعات تشغيل / 10 دقائق راحة)"

          while true
          do
            echo "🟢 تشغيل البوت لمدة 5 ساعات"
            node app.js &
            BOT_PID=$!

            sleep 18000  # 5 ساعات

            echo "🛑 إيقاف البوت"
            kill $BOT_PID || true

            echo "😴 راحة 10 دقائق"
            sleep 600
          done
